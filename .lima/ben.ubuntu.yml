# Lima VM for benstack-aws - Ben's Ubuntu config
#
# Create VM (run from repo root):
#   limactl create --name=benstack-aws ./.lima/ben.ubuntu.yml && limactl start benstack-aws
# SSH:     limactl shell benstack-aws
# Stop:    limactl stop benstack-aws
# Rebuild: limactl stop benstack-aws && limactl delete benstack-aws && limactl create --name=benstack-aws ./.lima/ben.ubuntu.yml && limactl start benstack-aws

minimumLimaVersion: "2.0.0"

vmType: vz

base:
  - template:_images/ubuntu-lts

cpus: 4
memory: "8GiB"

mounts:
  - location: "/Users/{{.User}}/Developer/benstack-aws"
    writable: true
  - location: "{{.Home}}/dotfiles"
    writable: false

## killport forwarding for VS Code remote. Reenable if you want to work from terminal instead    
portForwards:
  - guestPortRange: [1, 65535]
    ignore: true

# turn of containerd since we use docker in the repo.TODO: Maybe looking to switching away.
containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      apt -y update && apt -y install -y net-tools stow unzip
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      command -v docker >/dev/null 2>&1 && exit 0
      export DEBIAN_FRONTEND=noninteractive
      curl -fsSL https://get.docker.com | sh
      systemctl disable --now docker.service docker.socket containerd.service containerd.socket || true
      systemctl mask docker.service docker.socket containerd.service containerd.socket || true
      apt-get install -y uidmap dbus-user-session
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      systemctl --user start dbus
      dockerd-rootless-setuptool.sh install
      docker context use rootless
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      if ! command -v mise &>/dev/null; then
        curl https://mise.run | sh
      fi

      export PATH="$HOME/.local/bin:$PATH"

      if ! grep -q 'mise activate' ~/.bashrc; then
        echo 'eval "$(~/.local/bin/mise activate bash)"' >> ~/.bashrc
      fi

      if ! grep -q 'mise activate' ~/.profile; then
        echo 'eval "$(~/.local/bin/mise activate bash)"' >> ~/.profile
      fi

      eval "$(mise activate bash)"

      curl -fsSL https://claude.ai/install.sh | bash

      mise trust /Users/{{.User}}/Developer/benstack-aws/mise.toml
      cd /Users/{{.User}}/Developer/benstack-aws && mise install

probes:
  - mode: readiness
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until command -v docker >/dev/null 2>&1; do sleep 3; done"; then
        echo >&2 "docker is not installed yet"
        exit 1
      fi
      if ! timeout 30s bash -c "until pgrep rootlesskit; do sleep 3; done"; then
        echo >&2 "rootlesskit (rootless docker) is not running"
        exit 1
      fi
    hint: See "/var/log/cloud-init-output.log" in the guest
  - mode: readiness
    script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 10s bash -c "until [ -f $HOME/.local/bin/claude ]; do sleep 3; done"; then
        echo >&2 "Claude Code is not installed yet"
        exit 1
      fi
    hint: |
      Claude Code was not installed in the guest. Check "/var/log/cloud-init-output.log" in the guest for details.

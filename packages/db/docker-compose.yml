name: benstack-aws

services:
  postgres:
    image: postgres
    container_name: benstack-aws-postgres
    environment:
      POSTGRES_DB: benstack-aws
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - benstack-aws_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  benstack-aws_postgres_data:

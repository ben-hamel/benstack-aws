name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx turbo check-types

      - name: Verify database connectivity
        run: |
          bun -e "import { Pool } from 'pg'; const p = new Pool({ connectionString: process.env.DATABASE_URL }); await p.query('SELECT 1'); await p.end(); console.log('DB connection OK');"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

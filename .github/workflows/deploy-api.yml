name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - ".github/workflows/deploy-api.yml"

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/benstack-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migration image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f apps/server/Dockerfile \
            --target migrate \
            -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:migrate-${{ github.sha }} \
            -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:migrate-latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .

      - name: Update migrate task definition with new image
        id: migrate-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ vars.AWS_REGION }}:${{ vars.AWS_ACCOUNT_ID }}:task-definition/benstack-migrate
          container-name: migrate
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:migrate-${{ github.sha }}

      - name: Register migrate task definition
        id: register-migrate-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$(jq 'del(.tags)' ${{ steps.migrate-task-def.outputs.task-definition }})" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-def-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Run migrations on ECS
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=benstack-ecs-tasks" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster benstack \
            --task-definition ${{ steps.register-migrate-task-def.outputs.task-def-arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0ca001675e47fd157,subnet-083bc2d76e68d266d],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          timeout 60 aws ecs wait tasks-stopped \
            --cluster benstack \
            --tasks "$TASK_ARN" || {
            echo "Migration timed out — stopping task"
            aws ecs stop-task --cluster benstack --task "$TASK_ARN"
            exit 1
          }

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster benstack \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1

      - name: Build and push seed image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f apps/server/Dockerfile \
            --target seed \
            -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:seed-${{ github.sha }} \
            -t ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:seed-latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .

      - name: Update seed task definition with new image
        id: seed-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ vars.AWS_REGION }}:${{ vars.AWS_ACCOUNT_ID }}:task-definition/benstack-seed
          container-name: seed
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:seed-${{ github.sha }}

      - name: Register seed task definition
        id: register-seed-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$(jq 'del(.tags)' ${{ steps.seed-task-def.outputs.task-definition }})" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-def-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Run seed on ECS
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=benstack-ecs-tasks" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster benstack \
            --task-definition ${{ steps.register-seed-task-def.outputs.task-def-arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-0ca001675e47fd157,subnet-083bc2d76e68d266d],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Seed task: $TASK_ARN"

          timeout 120 aws ecs wait tasks-stopped \
            --cluster benstack \
            --tasks "$TASK_ARN" || {
            echo "Seed timed out — stopping task"
            aws ecs stop-task --cluster benstack --task "$TASK_ARN"
            exit 1
          }

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster benstack \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/benstack-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          IMAGE_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:${{ github.sha }}
          docker buildx build \
            --platform linux/amd64 \
            -f apps/server/Dockerfile \
            -t $IMAGE_URI \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ vars.AWS_REGION }}:${{ vars.AWS_ACCOUNT_ID }}:task-definition/benstack-api
          container-name: api
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: benstack-api
          cluster: benstack
          wait-for-service-stability: true

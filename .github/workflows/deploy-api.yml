name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/deploy-api.yml"

permissions:
  id-token: write
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/benstack-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push migration image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f apps/server/Dockerfile \
            --target migrate \
            -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:migrate-${{ github.sha }} \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .

      - name: Update migrate task definition with new image
        id: migrate-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ vars.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:task-definition/benstack-migrate
          container-name: migrate
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:migrate-${{ github.sha }}

      - name: Register migrate task definition
        id: register-migrate-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$(jq 'del(.tags)' ${{ steps.migrate-task-def.outputs.task-definition }})" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)
          echo "task-def-arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Run migrations on ECS
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=benstack-ecs-tasks" \
            --query 'SecurityGroups[0].GroupId' \
            --output text)
          echo "::add-mask::$SG_ID"

          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=defaultForAz,Values=true" \
            --query 'Subnets[*].SubnetId' \
            --output text | tr '\t' ',')
          echo "::add-mask::$SUBNET_IDS"

          TASK_ARN=$(aws ecs run-task \
            --cluster benstack \
            --task-definition ${{ steps.register-migrate-task-def.outputs.task-def-arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster benstack \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster benstack \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1


  deploy:
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/benstack-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:${{ github.sha }}
          docker buildx build \
            --platform linux/amd64 \
            -f apps/server/Dockerfile \
            -t $IMAGE_URI \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --push .

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: arn:aws:ecs:${{ vars.AWS_REGION }}:${{ secrets.AWS_ACCOUNT_ID }}:task-definition/benstack-api
          container-name: api
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/benstack-api:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: benstack-api
          cluster: benstack
          wait-for-service-stability: true

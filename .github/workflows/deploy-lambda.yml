name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - "apps/receipt-processor/**"
      - "packages/db/**"
      - ".github/workflows/deploy-lambda.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Lambda bundle
        run: bun run build:lambda

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/benstack-github-actions
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Lambda to AWS
        run: |
          cd apps/receipt-processor/dist
          zip function.zip index.js

          aws lambda update-function-code \
            --function-name benstack-receipt-processor \
            --zip-file fileb://function.zip

          aws lambda wait function-updated \
            --function-name benstack-receipt-processor

          echo "Lambda deployed successfully"
